name: Release Parsers

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lang: [python, typescript, javascript, rust]
        include:
          - lang: python
            crate: sieve-parser-python
          - lang: typescript
            crate: sieve-parser-typescript
          - lang: javascript
            crate: sieve-parser-javascript
          - lang: rust
            crate: sieve-parser-rust

    defaults:
      run:
        working-directory: parsers

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust wasm32-wasip1 target
        run: rustup target add wasm32-wasip1

      - name: Cache WASI-SDK
        id: cache-wasi
        uses: actions/cache@v4
        with:
          path: parsers/wasi-sdk-24.0-x86_64-linux
          key: wasi-sdk-24.0

      - name: Download WASI-SDK
        if: steps.cache-wasi.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-24/wasi-sdk-24.0-x86_64-linux.tar.gz
          tar xf wasi-sdk-24.0-x86_64-linux.tar.gz

      - name: Set WASI-SDK Environment Variables
        run: |
          WASI_SDK_PATH="${{ github.workspace }}/parsers/wasi-sdk-24.0-x86_64-linux"
          echo "CC_wasm32_wasip1=${WASI_SDK_PATH}/bin/clang" >> $GITHUB_ENV
          echo "CFLAGS_wasm32_wasip1=--sysroot=${WASI_SDK_PATH}/share/wasi-sysroot -Wno-implicit-function-declaration" >> $GITHUB_ENV
          echo "CARGO_TARGET_WASM32_WASIP1_RUSTFLAGS=-C link-arg=--allow-undefined" >> $GITHUB_ENV

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            parsers/target
          key: parsers-${{ matrix.lang }}-${{ hashFiles('parsers/Cargo.lock') }}
          restore-keys: parsers-${{ matrix.lang }}-

      - name: Build ${{ matrix.lang }}
        run: |
          cargo build \
            --target wasm32-wasip1 \
            --release \
            -p ${{ matrix.crate }}

      - name: Rename artifact
        run: |
          CRATE=$(echo "${{ matrix.crate }}" | tr '-' '_')
          cp target/wasm32-wasip1/release/${CRATE}.wasm \
             ${{ matrix.lang }}.wasm

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/parsers/${{ matrix.lang }}.wasm